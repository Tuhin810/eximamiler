services:
  exim:
    build: .
    container_name: proxymail-exim
    restart: unless-stopped
    env_file: .env
    ports:
      - "${SUBMISSION_PORT:-587}:587"
    volumes:
      # Persist DKIM keys and TLS certs across restarts.
      - ./data/dkim:/etc/exim4/dkim
      - ./data/tls:/etc/exim4/tls
      - ./data/spool:/var/spool/exim4

  # Management API: health, queue depth, and self-serve DKIM provisioning
  # (POST /dkim). Writes keys into the shared DKIM volume the exim
  # container reads, so the app can enable a domain without any SSH.
  mgmt:
    build: ./mgmt
    container_name: proxymail-exim-mgmt
    restart: unless-stopped
    env_file: .env
    depends_on: [exim]
    ports:
      - "${MGMT_PORT:-8443}:8443"
    volumes:
      # rw so the API can generate new DKIM keys into the shared volume.
      - ./data/dkim:/etc/exim4/dkim
